<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>आमंत्रण पत्र — श्री पीराराम लेगा</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Tiro+Devanagari+Hindi&family=Rozha+One&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
  :root{--wine:#6E1423;--gold:#C99238;--gold-soft:#E7D2A6;--cream:#FBF6EF;--ink:#2B1B1F;--muted:#8A7A72;--border:#EADBC4;--wa:#25D366;}
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:var(--cream);color:var(--ink);font-size:16px;line-height:1.5;}
  header{background:var(--wine);color:#fff;padding:18px 16px 14px;text-align:center;border-bottom:3px solid var(--gold);}
  header h1{margin:0;font-family:'Rozha One',Georgia,serif;font-size:1.3rem;}
  .wrap{max-width:560px;margin:0 auto;padding:18px 16px 60px;}
  .panel{background:#fff;border:1px solid var(--border);border-radius:16px;padding:16px;box-shadow:0 1px 4px rgba(110,20,35,.06);}
  .preview{border:1px dashed var(--gold-soft);border-radius:12px;padding:8px;text-align:center;background:#fffaf2;}
  canvas{max-width:100%;height:auto;border-radius:8px;box-shadow:0 2px 10px rgba(0,0,0,.12);}
  .caption{text-align:center;font-family:'Rozha One',serif;color:var(--wine);font-size:1.5rem;margin:14px 0 2px;letter-spacing:1px;}
  .caption .deco{color:var(--gold);}
  label{display:block;font-size:.9rem;font-weight:600;margin:18px 0 7px;}
  input[type=text]{width:100%;padding:15px 14px;border:1.5px solid var(--gold-soft);border-radius:12px;font-size:18px;font-family:inherit;background:#fffdf9;color:var(--ink);text-align:center;}
  input[type=text]:focus{outline:none;border-color:var(--gold);}
  .send{width:100%;background:var(--wa);color:#fff;padding:16px;border-radius:14px;font-weight:700;font-size:1.1rem;border:none;cursor:pointer;margin-top:16px;min-height:56px;display:flex;align-items:center;justify-content:center;gap:10px;}
  .send:disabled{opacity:.7;}
  .spin{width:18px;height:18px;border:2.5px solid rgba(255,255,255,.5);border-top-color:#fff;border-radius:50%;display:inline-block;animation:sp .8s linear infinite;}
  @keyframes sp{to{transform:rotate(360deg);}}
  .status{text-align:center;font-size:.86rem;color:var(--muted);margin-top:12px;min-height:20px;}
  .note{text-align:center;font-size:.8rem;color:var(--muted);margin-top:18px;}
</style>
</head>
<body>
<header><h1>श्री पीराराम लेगा — शुभ विवाह</h1></header>
<div class="wrap">
  <div class="panel">
    <div class="preview"><canvas id="canvas"></canvas></div>
    <div class="caption"><span class="deco">✦</span> आमंत्रण पत्र <span class="deco">✦</span></div>

    <label for="name">रिश्तेदार का नाम लिखें</label>
    <input type="text" id="name" placeholder="जैसे: रमेश काका जी" autocomplete="off">

    <button class="send" id="sendBtn" onclick="send()">📤 WhatsApp पर भेजें</button>
    <div class="status" id="status"></div>
    <div class="note">नाम लिखें → भेजें दबाएँ → कार्ड बनेगा → WhatsApp में संपर्क चुनकर Send करें।</div>
  </div>
</div>

const $=id=>document.getElementById(id);
const canvas=$('canvas'),ctx=canvas.getContext('2d');
let img=null,pos={x:0.55,y:0.576},J2=null,J3=null;
const SIZE=3.3,COLOR="#1a1a1a",FONT="'Tiro Devanagari Hindi',serif",WEIGHT="400";
function nm(){return ($('name').value||'').trim()||'रमेश काका जी';}

const c1=new Image();
c1.onload=()=>{let w=c1.width,h=c1.height,m=1400;if(w>m){h=h*m/w;w=m;}canvas.width=w;canvas.height=h;img=c1;draw(nm());};
c1.src=CARD1;
if(document.fonts&&document.fonts.ready)document.fonts.ready.then(()=>{if(img)draw(nm());});
function toJpeg(s){return new Promise(r=>{const i=new Image();i.onload=()=>{const c=document.createElement('canvas');c.width=i.width;c.height=i.height;c.getContext('2d').drawImage(i,0,0);r(c.toDataURL('image/jpeg',0.9));};i.src=s;});}
(async()=>{J2=await toJpeg(CARD2);J3=await toJpeg(CARD3);})();

async function ensureFont(){if(!document.fonts)return;try{await document.fonts.load(`${WEIGHT} ${Math.round(canvas.width*0.04)}px "Tiro Devanagari Hindi"`);}catch(e){}}
function fitPx(name){let s=SIZE;const mw=canvas.width*0.255;ctx.font=`${WEIGHT} ${canvas.width*s/100}px ${FONT}`;while(ctx.measureText(name).width>mw&&s>1.4){s-=0.1;ctx.font=`${WEIGHT} ${canvas.width*s/100}px ${FONT}`;}return canvas.width*s/100;}
function draw(name){if(!img)return;ctx.clearRect(0,0,canvas.width,canvas.height);ctx.drawImage(img,0,0,canvas.width,canvas.height);fitPx(name||'');ctx.fillStyle=COLOR;ctx.textAlign='center';ctx.textBaseline='alphabetic';ctx.fillText(name||'',pos.x*canvas.width,pos.y*canvas.height);}
$('name').addEventListener('input',()=>draw(nm()));

function message(name){return `🙏 श्री गणेशाय नमः 🙏\n\nश्रीमान् ${name},\nसादर प्रणाम। हमारे यहाँ शुभ विवाह के पावन अवसर पर आप सपरिवार सादर आमंत्रित हैं। कृपया पधारकर वर-वधू को आशीर्वाद प्रदान करें।\n\n— पीराराम लेगा परिवार 🎉`;}

async function buildPdf(name){
  await ensureFont();draw(name);
  const p1=canvas.toDataURL('image/jpeg',0.92);draw(nm());
  const {jsPDF}=window.jspdf;const pdf=new jsPDF('p','mm','a4');
  pdf.addImage(p1,'JPEG',0,0,210,297);
  if(J2){pdf.addPage();pdf.addImage(J2,'JPEG',0,0,210,297);}
  if(J3){pdf.addPage();pdf.addImage(J3,'JPEG',0,0,210,297);}
  const blob=pdf.output('blob');
  return new File([blob],`Invitation.pdf`,{type:'application/pdf'});
}

let busy=false;
async function send(){
  const name=$('name').value.trim();
  if(!name){alert('पहले नाम लिखें।');return;}
  if(busy)return;busy=true;
  const b=$('sendBtn'),old=b.innerHTML;b.disabled=true;b.innerHTML='<span class="spin"></span> कार्ड बन रहा है…';
  $('status').textContent='आमंत्रण पत्र (PDF) तैयार हो रहा है…';
  let file;
  try{file=await buildPdf(name);}catch(e){busy=false;b.disabled=false;b.innerHTML=old;$('status').textContent='⚠️ कार्ड बनने में दिक्कत। इंटरनेट ऑन है? फिर से कोशिश करें।';return;}
  b.disabled=false;b.innerHTML=old;busy=false;
  const text=message(name);
  if(navigator.canShare&&navigator.canShare({files:[file]})){
    $('status').textContent='✅ कार्ड तैयार! WhatsApp में संपर्क चुनकर Send दबाएँ।';
    try{await navigator.share({files:[file],text});}catch(e){}
  }else{
    const u=URL.createObjectURL(file);const a=document.createElement('a');a.href=u;a.download=file.name;a.click();setTimeout(()=>URL.revokeObjectURL(u),1500);
    $('status').innerHTML='⬇️ कार्ड डाउनलोड हो गया। WhatsApp में 📎 से यह PDF भेजें।';
  }
}
</script>
</body>
</html>
