<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gram Sewa Sahkari Samiti Portal</title>
    <style>
        /* Modern UI Styling */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f2f5;
        }

        /* Loading Screen Style */
        #loader-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #1e5799 0%, #2989d8 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 0.5s ease-out;
        }

        /* Professional Spinner Animation */
        .spinner {
            width: 70px;
            height: 70px;
            border: 8px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: #ffffff;
            animation: spin 1s ease-in-out infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loading-text {
            color: white;
            margin-top: 20px;
            font-size: 1.2rem;
            letter-spacing: 1px;
            font-weight: 300;
        }

        /* Iframe Styling */
        #portal-frame {
            width: 100%;
            height: 100vh;
            border: none;
            display: none; /* Shuru mein hide rahega */
        }

        /* Pulse Animation for Text */
        .pulse {
            animation: pulse-animation 2s infinite;
        }

        @keyframes pulse-animation {
            0% { opacity: 0.6; }
            50% { opacity: 1; }
            100% { opacity: 0.6; }
        }
    </style>
</head>
<body>

    <div id="loader-container">
        <div class="spinner"></div>
        <div class="loading-text pulse">Portal Load Ho Raha Hai...</div>
        <div style="color: rgba(255,255,255,0.7); margin-top: 10px; font-size: 0.8rem;">Gram Sewa Sahkari Samiti Barnawa Jagir</div>
    </div>

    <iframe 
        id="portal-frame" 
        src="https://script.google.com/macros/s/AKfycby-IEoOYUsBiNMVpnYTJMHxE_gaK9v7Wi42iWr5OnzHB5qIIvX4KUgcaCM5epmHAuYQ/exec" 
        allow="geolocation; microphone; camera">
    </iframe>

    <script>
        const iframe = document.getElementById('portal-frame');
        const loader = document.getElementById('loader-container');

        // Jab Iframe poori tarah load ho jaye
        iframe.onload = function() {
            // Loader ko fade-out karke hide karna
            loader.style.opacity = '0';
            setTimeout(() => {
                loader.style.display = 'none';
                iframe.style.display = 'block'; // Portal ko show karna
            }, 500);
        };

        // Error handling: Agar 15 seconds tak load na ho
        setTimeout(() => {
            if (loader.style.display !== 'none') {
                document.querySelector('.loading-text').innerHTML = "Thoda samay lag raha hai, kripya intezar karein...";
            }
        }, 10000);
    </script>

</body>
</html>
